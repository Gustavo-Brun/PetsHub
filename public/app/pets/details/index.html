<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Pet Details</title>

    <script src="/js/middleware.js"></script>

    <link
      rel="stylesheet"
      href="../styles.shared.css"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>

  <body onload="(validateSession(), getPet())">
    <div class="main_container">
      <section>
        <div
          id="details_container"
          class="card_container"
        ></div>
        <div
          id="addReview_container"
          class="card_container"
        ></div>
      </section>

      <section>
        <div
          id="listReview_container"
          class="card_container"
        ></div>
      </section>
    </div>

    <footer>
      <div class="actions_container">
        <button
          onclick="(sessionStorage.clear(), window.location.reload())"
          class="action_button"
        >
          <img
            src="/assets/imgs/logout.png"
            alt="Logout button"
          />
        </button>

        <a
          class="action_link"
          href="/app/pets/list"
        >
          <img
            src="/assets/imgs/return.png"
            alt="Return button"
          />
        </a>
      </div>
    </footer>
  </body>
</html>

<script>
  const userId = sessionStorage.userId;
  const petId = sessionStorage.petId;

  if (!userId || !petId) {
    window.location = '/app/pets/list';
  }

  let selectedPet;

  function getPet() {
    if (!petId) {
      return (window.location = '/app/pets/list');
    }

    fetch(`/pets/data/${petId}`, {
      method: 'GET'
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao encontrar o pet.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        res.json().then((data) => {
          selectedPet = data;

          if (!selectedPet.pet.picture) {
            selectedPet.pet.picture = 'no-image.jpg';
          }

          if (!selectedPet.pet.description) {
            selectedPet.pet.description = 'Sem descrição.';
          }

          renderDetails();
          renderReviews();
        });
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderDetails() {
    if (userId == selectedPet.tutor.id) {
      details_container.innerHTML = `
        <div class="picture_container">
          <img src="/pictures/${selectedPet.pet.picture}" />

          <input type="file" id="input_picture" >
           <button
              onclick="updateDetail('picture')"
              class="edit_button"
          >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
        <div>
          <input type="text" id="input_name" value="${selectedPet.pet.name}">
          <button
            onclick="updateDetail('name')"
            class="edit_button"
          >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
        <div>
          <input type="text" id="input_description" value="${selectedPet.pet.description}">
           <button
              onclick="updateDetail('description')"
              class="edit_button"
            >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
      `;

      let updatedName = input_name.value;
      let updatedPicture = input_picture.value;
      let updatedDescription = input_description.value;
    } else {
      details_container.innerHTML = `
        <img src="/pictures/${selectedPet.pet.picture}" />
        <h1>${selectedPet.pet.name}</h1>
        <p>${selectedPet.pet.description}</p>
      `;
    }
  }

  function updateDetail(column) {
    let value;

    if (column == 'picture') {
      value = input_picture.value;
    } else if (column == 'name') {
      value = input_name.value;
    } else if (column == 'description') {
      value = input_description.value;
    }

    fetch(`/pets/${petId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        userId,
        column,
        value
      })
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao atualizar o pet.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        window.location = '/app/pets/list';
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderReviews() {
    if (userId != selectedPet.tutor.id) {
      addReview_container.innerHTML = `
        <h2>Adicionar Review</h2>
        <span>Título</span>
        <input type="text" id="input_title">
        <select
          name="rating"
          id="select_rating"
        >
          <option
            value="0"
            selected
            disabled
          >
            Selecione uma opção
          </option>
          <option value="1">Não gostei</option>
          <option value="2">Mais ou menos</option>
          <option value="3">Gostei</option>
        </select>
        <span>Descrição</span>
        <textarea
          id="text_textarea"
          placeholder="Lorem ipsum dolor sit amet consectetur adipiscing elit."
          rows="6"
        ></textarea>
        <button onclick="createReview()">Adicionar Review</button
      `;
    } else {
      addReview_container.style.display = 'none';
    }

    let content = '';

    if (selectedPet.reviews.length <= 0) {
      content = '<li>Este pet está sem reviews :(. Seja o primeiro!</li>';
    }

    for (let i = 0; i < selectedPet.reviews.length; i++) {
      content += `
          <li>
            <span>${selectedPet.reviews[i].reviewUser}</span>
            <span>${selectedPet.reviews[i].reviewRating}</span>
            <span>${selectedPet.reviews[i].reviewTitle}</span>
            <span>${selectedPet.reviews[i].reviewText}</span>
          </li>
          <br />
        `;
    }

    listReview_container.innerHTML = content;
  }

  function createReview() {
    let title = input_title.value;
    let text = text_textarea.value;
    let rating = select_rating.value;

    fetch(`/reviews/create`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        userId,
        petId,
        title,
        text,
        rating
      })
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao processar os dados enviados.`);
          } else if (res.status == 409) {
            alert(`Você já deu uma review para este pet.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        window.location.reload();
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }
</script>
