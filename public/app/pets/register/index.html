<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Pet Register</title>

    <script src="/js/middleware.js"></script>

    <link
      rel="stylesheet"
      href="../styles.shared.css"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>

  <body onload="validateSession()">
    <div class="form_container">
      <div class="input_container">
        <h1>Cadastre seu Pet!</h1>
      </div>
      <div class="input_container">
        <label for="name_input">Nome</label>
        <input
          id="name_input"
          type="text"
          placeholder="Scooby"
        />
      </div>
      <div class="input_container">
        <label for="description_textarea">Descrição</label>
        <span>opcional</span>
        <textarea
          id="description_textarea"
          placeholder="Yorkshire cheio de energia, gosta de passear e interagir com outros cachorros."
        ></textarea>
      </div>
      <div class="input_container">
        <label for="picture_input">Imagem/Foto</label>
        <span>opcional</span>
        <input
          id="picture_input"
          type="file"
        />
      </div>

      <button onclick="send()">Cadastrar Pet</button>
    </div>
  </body>
</html>

<script>
  function send() {
    const name = name_input.value;
    const picture = picture_input.files[0];
    const description = description_textarea.value;
    const userId = sessionStorage.userId;

    if (!userId) {
      return (window.location = '/auth/signup');
    } else if (name.length < 2) {
      return alert('O nome deve conter ao menos 2 caracteres.');
    }

    const formData = new FormData();
    formData.append('name', name);
    formData.append('picture', picture);
    formData.append('description', description);
    formData.append('userId', userId);

    fetch('/pets/create', {
      method: 'POST',
      body: formData
    })
      .then((res) => {
        if (res.ok) {
          window.location = '/app/pets/list';
        } else if (res.status == 409) {
          alert(`Você já cadastrou o pet '${githubUrl}'.`);
        } else {
          alert('Opss, algo deu errado. Tente novamente mais tarde!');
        }
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }
</script>
