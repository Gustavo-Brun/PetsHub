<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta content="width=device-width, initial-scale=1.0" />
    <title>Project Details</title>

    <script src="/js/middleware.js"></script>

    <link
      rel="stylesheet"
      href="../styles.shared.css"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>

  <body onload="(validateSession(), getProject())">
    <div class="main_container">
      <section>
        <div
          id="details_container"
          class="card_container"
        ></div>
        <div
          id="addReview_container"
          class="card_container"
        ></div>
      </section>

      <section>
        <div
          id="listReview_container"
          class="card_container"
        ></div>
      </section>
    </div>

    <footer>
      <div class="actions_container">
        <button
          onclick="(sessionStorage.clear(), window.location.reload())"
          class="action_button"
        >
          <img
            src="/assets/imgs/logout.png"
            alt="Logout button"
          />
        </button>

        <a
          class="action_link"
          href="/app/projects/catalog"
        >
          <img
            src="/assets/imgs/return.png"
            alt="Return button"
          />
        </a>
      </div>
    </footer>
  </body>
</html>

<script>
  const projectId = sessionStorage.projectId;

  if (!projectId) {
    window.location = '/app/projects/catalog';
  }

  function getProject() {
    if (!projectId) {
      return (window.location = '/app/projects/catalog');
    }

    fetch(`/projects/${projectId}`, {
      method: 'GET'
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao selecionar o projeto.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        res.json().then((data) => {
          const fkUser = data[0].fkUser;
          const projectTitle = data[0].projectTitle;
          const picture = data[0].picture ? data[0].picture : 'no-image.jpg';
          const description = data[0].description ? data[0].description : 'Sem descrição.';
          const github = data[0].githubUrl;

          const reviewTitle = data[0].reviewTitle;
          const reviewText = data[0].reviewText;
          const reviewRating = data[0].reviewRating;

          renderDetails(fkUser, projectTitle, picture, description, github);
          renderReviews(fkUser, data);
        });
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderDetails(fkUser, title, picture, description, github) {
    if (fkUser == sessionStorage.userId) {
      details_container.innerHTML = `
        <div class="picture_container">
          <img src="/pictures/${picture}" />
          <button
              onclick="updateDetail('picture')"
              class="edit_button"
          >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
          <input type="text" id="input_picture" placeholder="Nova URL">
        </div>
        <div>
          <input type="text" id="input_title" value="${title}">
          <button
            onclick="updateDetail('title')"
            class="edit_button"
          >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
        <div>
          <input type="text" id="input_description" value="${description}">
           <button
              onclick="updateDetail('description')"
              class="edit_button"
            >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
        <div class="github_container">
          <a
            class="action_link"
            href="${github}"
          >
            <img
              src="/assets/imgs/github.png"
              alt="Github button"
            />
          </a>
          <input type="text" id="input_github" value="${github}">
          <button
            onclick="updateDetail('github')"
            class="edit_button"
          >
            <img
              src="/assets/imgs/edit.png"
              alt="Edit button"
            />
          </button>
        </div>
      `;

      let updatedTitle = input_title.value;
      let updatedPicture = input_picture.value;
      let updatedDescription = input_description.value;
      let updatedGithub = input_github;
    } else {
      details_container.innerHTML = `
        <img src="/pictures/${picture}" />
        <h1>${title}</h1>
        <p>${description}</p>
        <a
          class="action_link"
          href="${github}"
        >
          <img
            src="/assets/imgs/github.png"
            alt="Github button"
          />
        </a>
      `;
    }
  }

  function updateDetail(column) {
    const userId = sessionStorage.userId;

    let value;

    if (column == 'picture') {
      value = input_picture.value;
    } else if (column == 'title') {
      value = input_title.value;
    } else if (column == 'description') {
      value = input_description.value;
    } else if (column == 'github') {
      value = input_github.value;
    }

    fetch(`/projects/${projectId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        userId,
        column,
        value
      })
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao atualizar o projeto.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        window.location = '/app/projects/catalog';
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderReviews(fkUser, data) {
    if (fkUser != sessionStorage.userId) {
      addReview_container.innerHTML = `
        <h2>Adicionar Review</h2>
        <span>Feedbacks anônimos</span>
        <select
          name="rating"
          id="select_rating"
        >
          <option
            value="0"
            selected
            disabled
          >
            Selecione uma opção
          </option>
          <option value="1">Muito a melhorar</option>
          <option value="2">Não gostei</option>
          <option value="3">Mais ou menos</option>
          <option value="4">Gostei</option>
          <option value="5">Excelente</option>
        </select>
        <span>Descrição</span>
        <textarea
          id="text_textarea"
          placeholder="Lorem ipsum dolor sit amet consectetur adipiscing elit."
          rows="6"
        ></textarea>
        <button onclick="createReview()">Adicionar Review</button
      `;
    } else {
      addReview_container.style.display = 'none';
    }

    let content = '';

    for (let i = 0; i < data.length; i++) {
      content += `
          <li>
            <span>${data[i].reviewRating}</span>
            <span>${data[i].reviewTitle}</span>
            <span>${data[i].reviewText}</span>
          </li>
          <br />
        `;
    }

    listReview_container.innerHTML = content;
  }

  function createReview() {
    let title = '';
    let text = text_textarea.value;
    let rating = select_rating.value;

    fetch(`/reviews/create`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        projectId,
        title,
        text,
        rating
      })
    })
      .then((res) => {
        if (!res.ok) {
          if (res.status == 400) {
            alert(`Algo deu errado ao processar os dados enviados.`);
          } else {
            alert('Opss, algo deu errado. Tente novamente mais tarde!');
          }

          return;
        }

        window.location.reload();
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }
</script>
