<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>PetsHub | Dashboard</title>

    <link
      rel="stylesheet"
      href="./styles.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body onload="(getKpis(), getReviews())">
    <nav>
      <h1>PetsHub</h1>
      <ul>
        <li><a href="/">Início</a></li>
        <li><a href="/about">Sobre nós</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/auth/signin">Entrar</a></li>
      </ul>
    </nav>

    <section id="kpis_container"></section>

    <section><canvas id="myChartLine"></canvas></section>
  </body>
</html>

<script>
  function getReviews() {
    fetch('/reviews/listAll', {
      method: 'GET'
    })
      .then((res) => {
        res.json().then((reviews) => {
          renderChart(reviews);
        });
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderChart(reviews) {
    let labels = [];

    let data = {
      labels: labels,
      datasets: [
        {
          label: 'Reviews',
          data: [],
          fill: false,
          borderColor: 'rgb(0, 255, 0)'
        }
      ]
    };

    for (let i = 0; i < reviews.length; i++) {
      let iItem = reviews[i];
      let iFormattedDate = new Date(iItem.createdAt).toLocaleDateString('pt-br', {
        timeZone: 'UTC'
      });
      let exists = false;

      for (let j = 0; j < data.datasets[0].data.length; j++) {
        let jItem = data.labels[j];

        if (iFormattedDate == jItem) {
          exists = true;
          let dataIndex = data.labels.indexOf(iFormattedDate);
          data.datasets[0].data[dataIndex]++;
        }
      }

      if (!exists) {
        labels.push(iFormattedDate);
        data.datasets[0].data.push(1);
      }
    }

    const config = {
      type: 'line',
      data,
      options: {
        scales: {
          y: {
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    };

    const lineChart = new Chart(document.getElementById('myChartLine'), config);
  }

  function getKpis() {
    fetch('/reviews/kpis', {
      method: 'GET'
    })
      .then((res) => {
        if (res.ok) {
          res.json().then((data) => {
            renderKpis(data.most, data.less);
          });
        } else if (res.status == 404) {
          alert(`Dados de KPI não encontrados.`);
        } else {
          alert('Opss, algo deu errado. Tente novamente mais tarde!');
        }
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderKpis(most, less) {
    kpis_container.innerHTML += `
      <div onclick="redirect(${most.petId})">
        <span>${most.petId}</span>
        <p>${most.petName}</p>
        <p>${most.totalReviews} Review(s)</p>
      </div>
    `;

    kpis_container.innerHTML += `
      <div onclick="redirect(${most.petId})">
        <span>${less.petId}</span>
        <p>${less.petName}</p>
        <p>${less.totalReviews} Reviews</p>
      </div>
    `;
  }

  function redirect(id) {
    sessionStorage.petId = id;

    window.location = '/app/pets/details';
  }
</script>
