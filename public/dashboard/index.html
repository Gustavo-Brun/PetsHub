<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>PetsHub | Dashboard</title>

    <link
      rel="stylesheet"
      href="./styles.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body onload="(getKpis(), getReviews())">
    <nav>
      <h1>PetsHub</h1>
      <ul>
        <li><a href="/">Início</a></li>
        <li><a href="/app/pets/list">Pets</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/auth/signin">Entrar</a></li>
      </ul>
    </nav>

    <section id="kpis_container">
      <div>
        <div>
          <span></span>
          <p>Interações: <b>"Não gostei"</b></p>
          <p id="total_rating1"></p>
        </div>

        <div>
          <span></span>
          <p>Interações: <b>"Mais ou menos"</b></p>
          <p id="total_rating2"></p>
        </div>

        <div>
          <span></span>
          <p>Interações: <b>"Gostei"</b></p>
          <p id="total_rating3"></p>
        </div>
      </div>

      <div>
        <img
          src="/assets/imgs/arrow-down.png"
          alt="Arrow Down Icon"
        />
        <div
          id="less_container"
          style="border-color: red"
        >
          <p id="less_petName"></p>
          <p id="less_totalReviews"></p>
        </div>

        <div
          id="most_container"
          style="border-color: green"
        >
          <p id="most_petName"></p>
          <p id="most_totalReviews"></p>
        </div>
        <img
          src="/assets/imgs/arrow-up.png"
          alt="Arrow Up Icon"
        />
      </div>
    </section>

    <section id="chart_container">
      <h3>Interações por dia</h3>
      <canvas id="myChartLine"></canvas>
    </section>

    <span id="date"></span>
  </body>
</html>

<script>
  let currentDate = new Date();
  let startDate = new Date('2026-04-11');

  let diff = currentDate - startDate;
  let treatedDiff = Math.floor(diff / (1000 * 60 * 60 * 24));

  date.innerHTML = `Dias em desenvolvimento: ${treatedDiff}`;

  function getReviews() {
    fetch('/reviews/listAll', {
      method: 'GET'
    })
      .then((res) => {
        res.json().then((reviews) => {
          renderChart(reviews);
        });
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderChart(reviews) {
    let labels = [];

    let data = {
      labels: labels,
      datasets: [
        {
          label: 'Interações',
          data: [],
          fill: false,
          borderColor: 'rgb(0, 255, 0)'
        }
      ]
    };

    for (let i = 0; i < reviews.length; i++) {
      let iItem = reviews[i];
      let iFormattedDate = new Date(iItem.createdAt).toLocaleDateString('pt-br', {
        timeZone: 'UTC'
      });
      let exists = false;

      for (let j = 0; j < data.datasets[0].data.length; j++) {
        let jItem = data.labels[j];

        if (iFormattedDate == jItem) {
          exists = true;
          let dataIndex = data.labels.indexOf(iFormattedDate);
          data.datasets[0].data[dataIndex]++;
        }
      }

      if (!exists) {
        labels.push(iFormattedDate);
        data.datasets[0].data.push(1);
      }
    }

    const config = {
      type: 'line',
      data,
      options: {
        scales: {
          y: {
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    };

    const lineChart = new Chart(document.getElementById('myChartLine'), config);
  }

  function getKpis() {
    fetch('/reviews/kpis', {
      method: 'GET'
    })
      .then((res) => {
        if (res.ok) {
          res.json().then((data) => {
            renderKpis(data.total, data.most, data.less);
          });
        } else if (res.status == 404) {
          alert(`Dados de KPI não encontrados.`);
        } else {
          alert('Opss, algo deu errado. Tente novamente mais tarde!');
        }
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }

  function renderKpis(total, most, less) {
    total_rating1.innerHTML = total.rating1;
    total_rating2.innerHTML = total.rating2;
    total_rating3.innerHTML = total.rating3;

    most_container.addEventListener('click', () => redirect(most.petId));
    most_petName.innerHTML = most.petName;
    most_totalReviews.innerHTML = `${most.totalReviews} Interações Totais`;

    less_container.addEventListener('click', () => redirect(less.petId));
    less_petName.innerHTML = less.petName;
    less_totalReviews.innerHTML = `${less.totalReviews} Interações Totais`;
  }

  function redirect(id) {
    sessionStorage.petId = id;

    window.location = '/app/pets/details';
  }
</script>
